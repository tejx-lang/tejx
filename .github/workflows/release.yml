name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os-name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            os-name: Linux
            target: x86_64-unknown-linux-gnu
            bin: tejxc
            asset_name: tejxc-linux-x64
            ext: .tar.gz
          - os: macos-latest
            os-name: macOS-ARM64
            target: aarch64-apple-darwin
            bin: tejxc
            asset_name: tejxc-macos-arm64
            ext: .tar.gz
          - os: macos-latest
            os-name: macOS-x64
            target: x86_64-apple-darwin
            bin: tejxc
            asset_name: tejxc-macos-x64
            ext: .tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install LLVM (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang

      - name: Build release
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Archive binary
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar -czvf ../../../${{ matrix.platform.asset_name }}${{ matrix.platform.ext }} ${{ matrix.platform.bin }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.asset_name }}
          path: ${{ matrix.platform.asset_name }}${{ matrix.platform.ext }}

  build-wasm:
    name: Build - WASM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build WASM
        run: |
          cd wasm
          cargo build --release --target wasm32-unknown-unknown

      - name: Rename and Move WASM
        run: |
          mv wasm/target/wasm32-unknown-unknown/release/tejxc_wasm.wasm tejxc-wasm.wasm

      - name: Upload WASM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tejxc-wasm
          path: tejxc-wasm.wasm

  release:
    name: Create GitHub Release
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.wasm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
